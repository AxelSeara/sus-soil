      <style>
        body {
          margin: 0;
          background: linear-gradient(180deg, #eef8f0 0%, #f8fcf9 100%);
          color: #4c2b1c;
          font-family: Georgia, "Times New Roman", serif;
        }
        .noscript-message {
          box-sizing: border-box;
          max-width: 880px;
          margin: 32px auto;
          background: #ffffff;
          border: 1px solid #d8e7dc;
          border-radius: 16px;
          padding: 24px;
          box-shadow: 0 8px 22px rgba(32, 52, 39, 0.08);
        }
        .noscript-message .eyebrow {
          display: inline-block;
          font-size: 12px;
          letter-spacing: 0.04em;
          text-transform: uppercase;
          color: #2d6a4f;
          background: #eaf5ee;
          border: 1px solid #c8dfd1;
          border-radius: 999px;
          padding: 4px 10px;
          margin-bottom: 10px;
        }
        .noscript-message h1 {
          margin: 0 0 10px;
          font-size: 28px;
          line-height: 1.2;
          color: #4c2b1c;
        }
        .noscript-message p {
          margin: 0 0 14px;
          font-size: 16px;
          line-height: 1.55;
          color: #3f4a44;
        }
        .noscript-links {
          list-style: none;
          margin: 16px 0 0;
          padding: 0;
          display: grid;
          grid-template-columns: repeat(2, minmax(0, 1fr));
          gap: 10px;
        }
        .noscript-links a {
          display: block;
          text-decoration: none;
          background: #f7faf8;
          border: 1px solid #dbe8e1;
          border-radius: 10px;
          color: #2b3d33;
          font-weight: 600;
          padding: 10px 12px;
        }
        .noscript-links a:hover {
          background: #edf6f1;
        }
        .noscript-note {
          margin-top: 14px;
          font-size: 14px;
          color: #5f6a64;
        }
        @media (max-width: 640px) {
          .noscript-message {
            margin: 16px;
            padding: 18px;
            border-radius: 12px;
          }
          .noscript-message h1 {
            font-size: 24px;
          }
          .noscript-links {
            grid-template-columns: 1fr;
          }
        }
